; Dev CouchDB for the browser ring. Mirrors the production config
; (wingover.app/deploy/couchdb) closely enough that sync behaves the same here
; as it does on the real server. Secrets are public on purpose — this is a
; throwaway container, never reachable from anywhere but localhost.

[chttpd]
require_valid_user = true
; ...except /_up, so the healthcheck isn't 401'd by the line above. Learned the
; hard way: this exact omission took the production API down.
require_valid_user_except_for_up = true
enable_cors = true

[cors]
credentials = true
; The Vite dev server, and the iOS webview origin for `tauri ios dev`.
origins = http://localhost:5173, tauri://localhost
headers = accept, authorization, content-type, origin, referer
methods = GET, PUT, POST, HEAD, DELETE
