<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="./assets/sf-pro.css" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      :root {
        --ink: #fdf5e2;
        --muted: rgba(253, 240, 220, 0.68);
        --gold: #ffd489;
      }
      html, body { width: 100%; height: 100%; }
      body {
        font-family: "SF Pro Text", system-ui, -apple-system, sans-serif;
        color: var(--ink);
        overflow: hidden;
        background:
          radial-gradient(135% 78% at 72% 112%, rgba(255, 200, 110, 0.4) 0%, rgba(255, 150, 78, 0.13) 34%, transparent 62%),
          linear-gradient(to bottom, #241a3d 0%, #33223f 33%, #4a2b43 60%, #6b3739 82%, #8a5330 100%);
        -webkit-font-smoothing: antialiased;
      }
      .wrap {
        width: 100%; height: 100%;
        display: flex; flex-direction: column; align-items: center;
        padding: calc(var(--u) * 7) calc(var(--u) * 7.5) 0;
      }
      .head { text-align: center; flex-shrink: 0; }
      .headline {
        font-family: "SF Pro Display", system-ui, sans-serif;
        font-weight: 800; letter-spacing: -0.03em; word-spacing: 0.12em;
        line-height: 1.03; font-size: calc(var(--u) * 9.4); text-wrap: balance;
      }
      .headline .accent { color: var(--gold); }
      .sub {
        font-weight: 500; letter-spacing: -0.006em; line-height: 1.34;
        color: var(--muted); font-size: calc(var(--u) * 3.7);
        margin-top: calc(var(--u) * 2.7); max-width: 34ch; margin-inline: auto;
      }
      .stage { flex: 1; min-height: 0; width: 100%; position: relative; }
      /* Two phones tilted the same way, overlapping and bleeding off the
         edges — the synced logbook behind, the sync sheet in front. */
      .phone {
        position: absolute;
        display: flex;
        padding: calc(var(--u) * 2.3);
        border-radius: calc(var(--u) * 9.4);
        background: #0a0a0c;
        box-shadow:
          inset 0 0 0 1px rgba(255, 255, 255, 0.08),
          0 calc(var(--u) * 5) calc(var(--u) * 13) rgba(12, 6, 22, 0.72),
          0 calc(var(--u) * 1) calc(var(--u) * 3) rgba(0, 0, 0, 0.5);
      }
      /* Side by side, not overlapping: each tilts and bleeds off its outer
         edge with a gap between them. */
      .phone.back {
        height: 75%;
        top: 11%; left: -27%;
        transform: rotate(-6deg);
        z-index: 1;
      }
      .phone.front {
        height: 75%;
        top: 11%; right: -27%;
        transform: rotate(-6deg);
        z-index: 1;
      }
      .screen {
        position: relative; height: 100%; aspect-ratio: var(--screen-ar);
        border-radius: calc(var(--u) * 6.6); overflow: hidden; background: #000;
      }
      .screen img {
        position: absolute; inset: 0; width: 100%; height: 100%;
        object-fit: cover; object-position: top center; display: block;
      }
      .island {
        position: absolute; top: 1.35%; left: 50%; transform: translateX(-50%);
        width: 30%; height: 4.15%; background: #000; border-radius: 999px; z-index: 4;
      }
      .home-indicator {
        position: absolute; bottom: 0.85%; left: 50%; transform: translateX(-50%);
        width: 34%; height: 0.62%; border-radius: 999px; z-index: 6;
      }
      .home-indicator.light { background: rgba(255, 255, 255, 0.9); }
      .home-indicator.dark { background: rgba(0, 0, 0, 0.45); }
      .statusbar {
        position: absolute; top: 0; left: 0; right: 0; height: 6.3%;
        display: flex; align-items: center; justify-content: space-between;
        padding: 0 calc(var(--u) * 4.6) 0 calc(var(--u) * 5.2);
        z-index: 5; font-weight: 600; font-size: calc(var(--u) * 3.05); letter-spacing: -0.02em;
      }
      .statusbar.dark { color: #000; }
      .statusbar.light { color: #fff; }
      .statusbar .glyphs { display: flex; align-items: center; gap: calc(var(--u) * 0.85); }
      .statusbar svg { height: calc(var(--u) * 2.35); width: auto; fill: currentColor; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="head">
        <div class="headline" id="hl"></div>
        <div class="sub" id="sub"></div>
      </div>
      <div class="stage" id="stage"></div>
    </div>
    <script>
      const TICK = "";
      const GLYPHS = `<span class="glyphs">
        <svg viewBox="0 0 18 12"><rect x="0" y="8" width="3" height="4" rx="1"/><rect x="5" y="5" width="3" height="7" rx="1"/><rect x="10" y="2.5" width="3" height="9.5" rx="1"/><rect x="15" y="0" width="3" height="12" rx="1"/></svg>
        <svg viewBox="0 0 16 12"><path d="M8 2.4c2.7 0 5.2 1 7.1 2.8l-1.5 1.6A7.9 7.9 0 0 0 8 5.6c-2.1 0-4.1.8-5.6 2.2L.9 6.2A10.3 10.3 0 0 1 8 2.4Zm0 3.9c1.6 0 3.1.6 4.2 1.7l-1.6 1.6c-.7-.7-1.6-1-2.6-1s-1.9.4-2.6 1L3.8 8c1.1-1.1 2.6-1.7 4.2-1.7Zm0 3.6 1.5 1.5-1.5 1.5-1.5-1.5L8 10Z"/></svg>
        <svg viewBox="0 0 27 12"><rect x="0.5" y="0.5" width="22" height="11" rx="3" fill="none" stroke="currentColor" stroke-opacity="0.4"/><rect x="2" y="2" width="19" height="8" rx="1.6"/><rect x="24" y="4" width="2" height="4" rx="1"/></svg>
      </span>`;
      function phone(cls, tone, src) {
        return `<div class="phone ${cls}"><div class="screen">
          <img src="${src}" />
          <div class="island"></div>
          <div class="home-indicator ${tone}"></div>
          <div class="statusbar ${tone}"><span>9:41</span>${GLYPHS}</div>
        </div></div>`;
      }
      window.__renderDuo = function (F) {
        const r = document.documentElement.style;
        r.setProperty("--u", F.u + "px");
        r.setProperty("--screen-ar", F.screenAr);
        document.getElementById("hl").innerHTML = (F.headline || "").replace(
          /\[(.+?)\]/g, '<span class="accent">$1</span>');
        const sub = document.getElementById("sub");
        sub.innerHTML = (F.sub || "").replace(/\n/g, "<br>");
        document.getElementById("stage").innerHTML =
          phone("back", F.tone || "light", F.shotBack) +
          phone("front", F.tone || "light", F.shotFront);
      };
    </script>
  </body>
</html>
