name: Docker

# Builds the versioned PWA container image (the deploy unit) and publishes it to
# GHCR — nothing else. Two channels, mirroring iOS: every push to `main`
# publishes :main (the web analog of TestFlight, served at beta.wingover.app); a
# bare version tag (e.g. 0.2.0, created by `pnpm release`) publishes :<version>
# + :latest (prod, wingover.app). :latest is ALWAYS the newest release. PRs
# build single-arch to catch Dockerfile breakage without pushing.
#
# This repo owns the ARTIFACT, not the deploy: it never touches wingover.app.
# The box pulls new images itself (a Watchtower poll defined in the wingover.app
# repo), so there is no dispatch, no SSH, and no deploy credential here.
on:
  push:
    branches: [main]
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
  pull_request:
    # Only re-validate the image when something that feeds the build changes.
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - "deploy/**"
      - ".github/workflows/docker.yml"
      - "src/**"
      - "public/**"
      - "index.html"
      - "package.json"
      - "pnpm-lock.yaml"
      - "vite.config.ts"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # QEMU provides the arm64 emulation that the multi-arch (tag) build needs.
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      # Only real publishes need a registry login; PRs (incl. from forks, where
      # the token is read-only) just build.
      - if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      # metadata-action derives the tags from the ref: :<version> + :latest on a
      # version-tag push, :main on a main push. `latest=false` disables the
      # auto-latest flavor so :latest comes ONLY from the explicit tag-gated
      # rule below — it always points at the newest RELEASE, never at main.
      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/aeharding/wingover
          flavor: latest=false
          tags: |
            type=ref,event=tag
            type=ref,event=branch
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          # Only release tags build multi-arch (arm64 under QEMU is slow, and
          # only prod pins a version); PRs and the frequent :main build amd64
          # only — the one puller (the Droplet) is amd64.
          platforms: ${{ startsWith(github.ref, 'refs/tags/') && 'linux/amd64,linux/arm64' || 'linux/amd64' }}
          # PRs validate the build only; main, tags, and dispatch publish.
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Public, origin-locked MapKit token baked into the client bundle.
          # A repo variable (not a secret), mirroring testflight.yml.
          build-args: |
            VITE_MAPKIT_TOKEN_WINGOVER_APP=${{ vars.VITE_MAPKIT_TOKEN_WINGOVER_APP }}
            VITE_MAPKIT_TOKEN_BETA_WINGOVER_APP=${{ vars.VITE_MAPKIT_TOKEN_BETA_WINGOVER_APP }}
            # The footer sha marks a continuous build (:main -> beta.wingover.app);
            # a version-tag build (-> wingover.app) sends an empty sha and the
            # footer shows the clean version alone. Gated on the ref from the
            # Actions context (Voyager-style) — no git read in the build.
            GIT_SHA=${{ startsWith(github.ref, 'refs/tags/') && '' || github.sha }}
