name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .tool-versions
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm format:check
      # *.module.css.d.ts are generated (postinstall), not committed;
      # check:css's pairing check fails if generation didn't run.
      - run: pnpm check:css
      - run: pnpm exec vitest run
      - run: pnpm build
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm exec playwright test
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  # The only job that compiles Swift. Without it the native plugin is checked
  # by nothing until TestFlight builds it — on main, after merge, where a
  # failure is already everyone's problem. macOS minutes are free on public
  # repos, so the only thing this ever cost was thinking to ask for it.
  #
  # cargo, not xcodebuild, and this is the whole trick: the plugin's build
  # script calls tauri_utils::build::link_apple_library() when the target OS is
  # iOS, so `cargo build` IS the Swift compile (tauri-plugin-2.6.3,
  # src/build/mobile.rs). No Xcode project, no signing, no dev server, no dist.
  #
  # Driving xcodebuild directly does not work and is not worth retrying: the
  # generated project's "Build Rust Code" phase shells out to `tauri ios
  # xcode-script`, which reads state that only `tauri ios build` writes, and
  # panics on a missing dev-server address file
  # (tauri-cli/src/mobile/mod.rs:386) for BOTH platforms and BOTH
  # configurations. And `tauri ios build` itself archives, which needs the
  # distribution cert a fork's PR can never have.
  ios:
    name: iOS build
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v7
      - run: rustup target add aarch64-apple-ios
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri/plugins/wingover
            src-tauri/plugins/ionic
      - name: Compile the native plugins, Swift and all
        env:
          # Xcode always exports this; a bare cargo build does not, and
          # tauri-utils then hands swift-rs a default of "13.0" — Package.swift's
          # .iOS(.v16) is never consulted (tauri-utils/src/build.rs). Without
          # this line every StoreKit call fails as "only available in iOS 15.0
          # or newer" and the job reports a bug the real build does not have.
          # Must track project.yml's deploymentTarget.
          IPHONEOS_DEPLOYMENT_TARGET: "16.0"
        run: |
          cargo build --locked \
            --manifest-path src-tauri/plugins/wingover/Cargo.toml \
            --target aarch64-apple-ios
          cargo build --locked \
            --manifest-path src-tauri/plugins/ionic/Cargo.toml \
            --target aarch64-apple-ios

  # The behaviors no browser test can reach: the REAL WKWebView + REAL iOS
  # keyboard, driven by XCUITest (ios-tests/ — a standalone runner with no
  # host app; it launches the installed sim build by bundle id, sidestepping
  # the generated project entirely; see the ios job's comment for why).
  # WKWebView content is fully visible to XCUITest's accessibility tree, so
  # the assertions read Ionic's tabs and inputs directly.
  ios-sim:
    name: iOS simulator tests
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .tool-versions
          cache: pnpm
      - run: rustup target add aarch64-apple-ios-sim
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: pnpm install --frozen-lockfile
      - name: Build the simulator app
        run: pnpm exec tauri ios build --target aarch64-sim --debug --ci
      - name: Boot a simulator and install the app
        run: |
          # Real software keyboard, or the keyboard assertions test nothing.
          defaults write com.apple.iphonesimulator ConnectHardwareKeyboard -bool false
          DEVTYPE=$(xcrun simctl list devicetypes | grep -oE "iPhone 1[0-9][^(]*" | tail -1 | xargs)
          UDID=$(xcrun simctl create uitest "$DEVTYPE")
          xcrun simctl boot "$UDID"
          xcrun simctl bootstatus "$UDID" -b
          xcrun simctl install "$UDID" src-tauri/gen/apple/build/arm64-sim/Wingover.app
          echo "UDID=$UDID" >> "$GITHUB_ENV"
      - name: Run XCUITests
        # run.sh owns the test-side setup shared with local runs: location
        # permission pre-grant, the simulated-flight location scenario, and
        # xcodebuild flags (-collect-test-diagnostics never is load-bearing —
        # a failing run otherwise embeds a multi-GB logarchive).
        run: ios-tests/run.sh "$UDID"
      - name: Screenshot on failure
        if: failure()
        run: xcrun simctl io "$UDID" screenshot ios-sim-failure.png || true
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: ios-sim-failure
          path: ios-sim-failure.png
          retention-days: 7
