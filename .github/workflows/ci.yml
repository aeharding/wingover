name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .tool-versions
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm exec vitest run
      - run: pnpm build
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm exec playwright test
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  # The only job that compiles Swift. Without it the native plugin is checked
  # by nothing until TestFlight builds it — on main, after merge, where a
  # failure is already everyone's problem. macOS minutes are free on public
  # repos, so the only thing this ever cost was thinking to ask for it.
  #
  # Device SDK, unsigned, on purpose. Two things had to be true and only one
  # was obvious:
  #
  # Unsigned, because an ARCHIVE needs the distribution cert, which a fork's PR
  # can never have — signing is TestFlight's job. `xcodebuild build` doesn't
  # need it.
  #
  # Device rather than simulator, because `tauri ios xcode-script` decides it is
  # serving `tauri ios dev` from the PLATFORM, not the configuration: pass it
  # "iOS Simulator" and it panics looking for a dev server's address file
  # (tauri-cli/src/mobile/mod.rs:386) no matter how release the build is.
  ios:
    name: iOS build
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .tool-versions
          cache: pnpm
      - run: rustup target add aarch64-apple-ios
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: pnpm install --frozen-lockfile
      # The Xcode "Build Rust Code" phase shells out to `tauri ios xcode-script`
      # and expects dist/ to exist already: beforeBuildCommand only runs under
      # `tauri ios build`, which we deliberately aren't using.
      - run: pnpm build
      - name: Build the app
        run: |
          xcodebuild build \
            -project src-tauri/gen/apple/wingover.xcodeproj \
            -scheme wingover_iOS \
            -configuration release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM=""
